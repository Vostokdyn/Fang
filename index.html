<html lang="en">
<head>
<meta charset="UTF-8">
<title>Vostok Dynamics</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Russo+One&display=swap" rel="stylesheet">
<style>
  html, body {
    margin: 0;
    padding: 0;
    background: #ffffff;
    font-family: 'Russo One', sans-serif;
  }
 
  .hero {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 6vh 6vw;
  }
 
  .hero img {
    max-width: 75vw;
    max-height: 75vh;
    width: auto;
    height: auto;
    margin-bottom: 3rem;
  }
 
  .date {
    font-family: 'Russo One', sans-serif;
    font-weight: 400;
    font-size: clamp(2.5rem, 7vw, 6rem);
    color: #d92b2b;
    letter-spacing: 0.05em;
    margin: 0 0 2rem 0;
    line-height: 1;
  }
 
  .quote-block {
    max-width: 700px;
  }
 
  .quote {
    font-family: 'Russo One', sans-serif;
    font-weight: 400;
    font-size: clamp(1rem, 2.2vw, 1.4rem);
    color: #1a1a1a;
    line-height: 1.6;
    margin: 0 0 1rem 0;
  }
 
  .attribution {
    font-family: 'Russo One', sans-serif;
    font-size: clamp(0.9rem, 1.8vw, 1.1rem);
    color: #c9a400;
  }
 
  /* extra scrollable space below the hero */
  .spacer {
    min-height: 100vh;
    background: #ffffff;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 1.75rem;
  }
 
  .ig-label {
    font-family: 'Russo One', sans-serif;
    font-size: clamp(1.2rem, 2.5vw, 1.8rem);
    color: #1a1a1a;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
 
  .instagram-link {
    position: relative;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 100px;
    height: 100px;
    border-radius: 50%;
    text-decoration: none;
    background: #1a1a1a;
  }
 
  .instagram-link svg {
    width: 44px;
    height: 44px;
    fill: #ffffff;
  }
 
  .instagram-link:hover {
    background: #d92b2b;
  }
 
  .ig-handle {
    font-family: 'Russo One', sans-serif;
    font-size: clamp(0.85rem, 1.6vw, 1rem);
    color: #962fbf;
    letter-spacing: 0.05em;
  }
 
  .music-toggle {
    position: fixed;
    top: 24px;
    right: 24px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 56px;
    height: 56px;
    border-radius: 50%;
    background: #1a1a1a;
    border: none;
    cursor: pointer;
    z-index: 10;
  }
 
  .music-toggle:hover {
    background: #d92b2b;
  }
 
  .music-toggle svg {
    width: 26px;
    height: 26px;
    fill: #ffffff;
  }
</style>
</head>
<body>
 
  <button class="music-toggle" id="musicToggle" aria-label="Play music">
    <svg id="musicIcon" viewBox="0 0 384 512" xmlns="http://www.w3.org/2000/svg">
      <path d="M73 39c-14.8-9.1-33.4-9.4-48.5-.9S0 62.6 0 80V432c0 17.4 9.4 33.4 24.5 41.9S58.2 481.1 73 472L361 297c14.3-8.7 23-24.2 23-41s-8.7-32.2-23-41L73 39z"/>
    </svg>
  </button>
 
  <audio id="bgMusic" src="music.mp3" loop></audio>
 
  <section class="hero">
    <img src="VOSTOK_DYNAMICS.png" alt="Vostok Dynamics">
 
    <h1 class="date">April 12, 1961</h1>
 
    <div class="quote-block">
      <p class="quote">"To be the first to enter the cosmos, to engage, single-handed, in an unprecedented duel with nature—could one dream of anything more?"</p>
      <p class="attribution">— Yuri Gagarin</p>
    </div>
  </section>
 
  <section class="spacer">
    <p class="ig-label">My Instagram</p>
    <a class="instagram-link" href="https://www.instagram.com/vostok.dyn" target="_blank" rel="noopener noreferrer" aria-label="Follow Vostok Dynamics on Instagram">
      <svg viewBox="0 0 448 512" xmlns="http://www.w3.org/2000/svg">
        <path d="M224.1 141c-63.6 0-114.9 51.3-114.9 114.9s51.3 114.9 114.9 114.9S339 319.5 339 255.9 287.7 141 224.1 141zm0 189.6c-41.1 0-74.7-33.5-74.7-74.7s33.5-74.7 74.7-74.7 74.7 33.5 74.7 74.7-33.6 74.7-74.7 74.7zm146.4-194.3c0 14.9-12 26.8-26.8 26.8-14.9 0-26.8-12-26.8-26.8s12-26.8 26.8-26.8 26.8 12 26.8 26.8zm76.1 27.2c-1.7-35.9-9.9-67.7-36.2-93.9-26.2-26.2-58-34.4-93.9-36.2-37-2.1-147.9-2.1-184.9 0-35.8 1.7-67.6 9.9-93.9 36.1s-34.4 58-36.2 93.9c-2.1 37-2.1 147.9 0 184.9 1.7 35.9 9.9 67.7 36.2 93.9s58 34.4 93.9 36.2c37 2.1 147.9 2.1 184.9 0 35.9-1.7 67.7-9.9 93.9-36.2 26.2-26.2 34.4-58 36.2-93.9 2.1-37 2.1-147.8 0-184.8zM398.8 388c-7.8 19.6-22.9 34.7-42.6 42.6-29.5 11.7-99.5 9-132.1 9s-102.7 2.6-132.1-9c-19.6-7.8-34.7-22.9-42.6-42.6-11.7-29.5-9-99.5-9-132.1s-2.6-102.7 9-132.1c7.8-19.6 22.9-34.7 42.6-42.6 29.5-11.7 99.5-9 132.1-9s102.7-2.6 132.1 9c19.6 7.8 34.7 22.9 42.6 42.6 11.7 29.5 9 99.5 9 132.1s2.7 102.7-9 132.1z"/>
      </svg>
    </a>
    <p class="ig-handle">@vostok.dyn</p>
  </section>
 
  <script>
    const musicBtn = document.getElementById('musicToggle');
    const musicIcon = document.getElementById('musicIcon');
    const audio = document.getElementById('bgMusic');
 
    const playIconPath = "M73 39c-14.8-9.1-33.4-9.4-48.5-.9S0 62.6 0 80V432c0 17.4 9.4 33.4 24.5 41.9S58.2 481.1 73 472L361 297c14.3-8.7 23-24.2 23-41s-8.7-32.2-23-41L73 39z";
    const pauseIconPath = "M48 64C21.5 64 0 85.5 0 112V400c0 26.5 21.5 48 48 48H80c26.5 0 48-21.5 48-48V112c0-26.5-21.5-48-48-48H48zm192 0c-26.5 0-48 21.5-48 48V400c0 26.5 21.5 48 48 48h32c26.5 0 48-21.5 48-48V112c0-26.5-21.5-48-48-48H240z";
 
    musicBtn.addEventListener('click', () => {
      if (audio.paused) {
        audio.play();
        musicIcon.querySelector('path').setAttribute('d', pauseIconPath);
        musicIcon.setAttribute('viewBox', '0 0 320 512');
        musicBtn.setAttribute('aria-label', 'Pause music');
      } else {
        audio.pause();
        musicIcon.querySelector('path').setAttribute('d', playIconPath);
        musicIcon.setAttribute('viewBox', '0 0 384 512');
        musicBtn.setAttribute('aria-label', 'Play music');
      }
    });
  </script>
 
</body>
</html>
