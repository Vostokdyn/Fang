<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vostok Dynamics</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Russo+One&family=Ubuntu:wght@400;700&display=swap" rel="stylesheet">
<style>
  html, body {
    margin: 0;
    padding: 0;
    font-family: 'Russo One', sans-serif;
    color: #f2ede3;
    overflow-x: hidden;
    background-color: #0a2440;
  }

  /* Parallax background: fixed viewport-sized window containing an
     oversized image that we translate on scroll for a depth effect. */
  .bg-wrap {
    position: fixed;
    inset: 0;
    z-index: -3;
    overflow: hidden;
    background-color: #0a2440;
  }

  .bg-wrap img {
    position: absolute;
    top: -30%;
    left: 50%;
    width: 100%;
    height: 160%;
    object-fit: cover;
    transform: translate3d(-50%, 0, 0) scale(1.06);
    will-change: transform;
  }

  /* Drifting starfield, sits between the image and the color overlay */
  .stars {
    position: fixed;
    inset: 0;
    z-index: -2;
    pointer-events: none;
  }

  .star {
    position: absolute;
    background: #ffffff;
    border-radius: 50%;
    opacity: 0.15;
    animation: twinkle 4s ease-in-out infinite;
  }

  @keyframes twinkle {
    0%, 100% { opacity: 0.1; }
    50% { opacity: 0.85; }
  }

  .bg-overlay {
    position: fixed;
    inset: 0;
    z-index: -1;
    background: linear-gradient(
      to bottom,
      rgba(4, 8, 20, 0.55) 0%,
      rgba(4, 8, 20, 0.3) 40%,
      rgba(4, 8, 20, 0.7) 100%
    );
  }

  .reveal {
    opacity: 0;
    transform: translateY(28px);
    transition: opacity 0.9s ease, transform 0.9s ease;
  }

  .reveal.is-visible {
    opacity: 1;
    transform: translateY(0);
  }

  @media (prefers-reduced-motion: reduce) {
    .bg-wrap img { transform: translate3d(-50%, 0, 0) scale(1) !important; }
    .star { animation: none; opacity: 0.4; }
    .reveal {
      opacity: 1;
      transform: none;
      transition: none;
    }
  }

  .hero {
    position: relative;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 6vh 6vw;
    overflow: hidden;
  }

  .hero > * {
    position: relative;
    z-index: 1;
  }

  .hero img {
    max-width: 75vw;
    max-height: 75vh;
    width: auto;
    height: auto;
    margin-bottom: 3rem;
  }

  .date {
    font-family: 'Russo One', sans-serif;
    font-weight: 400;
    font-size: clamp(2.5rem, 7vw, 6rem);
    color: #e8392f;
    letter-spacing: 0.05em;
    margin: 0 0 2rem 0;
    line-height: 1;
    text-shadow: 0 2px 18px rgba(0, 0, 0, 0.6);
  }

  .quote-block {
    max-width: 700px;
  }

  .quote {
    font-family: 'Russo One', sans-serif;
    font-weight: 400;
    font-size: clamp(1rem, 2.2vw, 1.4rem);
    color: #f2ede3;
    line-height: 1.6;
    margin: 0 0 1rem 0;
    text-shadow: 0 2px 12px rgba(0, 0, 0, 0.7);
  }

  .attribution {
    font-family: 'Russo One', sans-serif;
    font-size: clamp(0.9rem, 1.8vw, 1.1rem);
    color: #e0b83e;
    text-shadow: 0 2px 10px rgba(0, 0, 0, 0.6);
  }

  /* extra scrollable space below the hero */
  .spacer {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 1.75rem;
  }

  .ig-label {
    font-family: 'Russo One', sans-serif;
    font-size: clamp(1.2rem, 2.5vw, 1.8rem);
    color: #f2ede3;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    text-shadow: 0 2px 12px rgba(0, 0, 0, 0.7);
  }

  .instagram-link {
    position: relative;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 100px;
    height: 100px;
    border-radius: 50%;
    text-decoration: none;
    background: rgba(20, 20, 20, 0.75);
    border: 2px solid rgba(242, 237, 227, 0.25);
    transition: background 0.2s ease, border-color 0.2s ease;
  }

  .instagram-link svg {
    width: 44px;
    height: 44px;
    fill: #ffffff;
  }

  .instagram-link:hover {
    background: #d92b2b;
    border-color: rgba(242, 237, 227, 0.6);
  }

  .ig-handle {
    font-family: 'Russo One', sans-serif;
    font-size: clamp(0.85rem, 1.6vw, 1rem);
    color: #c9a4ff;
    letter-spacing: 0.05em;
    text-shadow: 0 2px 10px rgba(0, 0, 0, 0.6);
  }

  .under-construction {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 6rem 6vw;
  }

  .uc-text {
    font-family: 'Ubuntu', sans-serif;
    font-weight: 700;
    font-size: clamp(1.8rem, 5vw, 3.5rem);
    color: #f2ede3;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    margin: 0;
    text-shadow: 0 2px 14px rgba(0, 0, 0, 0.7);
  }

  .music-toggle {
    position: fixed;
    top: 24px;
    right: 24px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 56px;
    height: 56px;
    border-radius: 50%;
    background: rgba(20, 20, 20, 0.75);
    border: none;
    cursor: pointer;
    z-index: 10;
    transition: background 0.2s ease;
  }

  .music-toggle:hover {
    background: #d92b2b;
  }

  .music-toggle:focus-visible {
    outline: 2px solid #e0b83e;
    outline-offset: 2px;
  }

  .music-toggle svg {
    width: 26px;
    height: 26px;
    fill: #ffffff;
  }

  @media (prefers-reduced-motion: reduce) {
    .music-toggle,
    .instagram-link {
      transition: none;
    }
  }
</style>
</head>

  <script>
    const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

    // --- Parallax background ---
    // The image sits inside a viewport-fixed window and is oversized (136% tall).
    // As the page scrolls we nudge it up at a fraction of the scroll speed, so it
    // drifts slower than the content on top of it instead of feeling glued in place.
    const bgImg = document.getElementById('bgImg');
    if (bgImg && !prefersReducedMotion) {
      let ticking = false;
      const PARALLAX_FACTOR = 0.18;

      function updateParallax() {
        // The image has ~30% buffer top and bottom (see CSS). Cap the shift
        // well inside that buffer so the image can never run out of cover,
        // no matter how long the page is.
        const maxOffset = window.innerHeight * 0.22;
        const raw = window.scrollY * PARALLAX_FACTOR;
        const offset = Math.min(raw, maxOffset);
        bgImg.style.transform = `translate3d(-50%, -${offset}px, 0) scale(1.06)`;
        ticking = false;
      }

      window.addEventListener('scroll', () => {
        if (!ticking) {
          requestAnimationFrame(updateParallax);
          ticking = true;
        }
      }, { passive: true });

      updateParallax();
    }

    // --- Starfield ---
    const starsContainer = document.getElementById('stars');
    if (starsContainer) {
      const STAR_COUNT = 60;
      const frag = document.createDocumentFragment();
      for (let i = 0; i < STAR_COUNT; i++) {
        const star = document.createElement('span');
        star.className = 'star';
        const size = Math.random() * 2 + 1;
        star.style.width = `${size}px`;
        star.style.height = `${size}px`;
        star.style.left = `${Math.random() * 100}%`;
        star.style.top = `${Math.random() * 100}%`;
        star.style.animationDelay = `${Math.random() * 4}s`;
        star.style.animationDuration = `${3 + Math.random() * 3}s`;
        frag.appendChild(star);
      }
      starsContainer.appendChild(frag);
    }

    // --- Scroll reveal ---
    const revealEls = document.querySelectorAll('.reveal');
    if ('IntersectionObserver' in window && revealEls.length) {
      const observer = new IntersectionObserver((entries) => {
        entries.forEach((entry) => {
          if (entry.isIntersecting) {
            entry.target.classList.add('is-visible');
            observer.unobserve(entry.target);
          }
        });
      }, { threshold: 0.2 });

      revealEls.forEach((el) => observer.observe(el));
    } else {
      revealEls.forEach((el) => el.classList.add('is-visible'));
    }

    const musicBtn = document.getElementById('musicToggle');
    const musicIcon = document.getElementById('musicIcon');
    const audio = document.getElementById('bgMusic');

    const playIconPath = "M73 39c-14.8-9.1-33.4-9.4-48.5-.9S0 62.6 0 80V432c0 17.4 9.4 33.4 24.5 41.9S58.2 481.1 73 472L361 297c14.3-8.7 23-24.2 23-41s-8.7-32.2-23-41L73 39z";
    const pauseIconPath = "M48 64C21.5 64 0 85.5 0 112V400c0 26.5 21.5 48 48 48H80c26.5 0 48-21.5 48-48V112c0-26.5-21.5-48-48-48H48zm192 0c-26.5 0-48 21.5-48 48V400c0 26.5 21.5 48 48 48h32c26.5 0 48-21.5 48-48V112c0-26.5-21.5-48-48-48H240z";

    musicBtn.addEventListener('click', () => {
      if (audio.paused) {
        // audio.play() returns a promise that rejects if the browser
        // blocks autoplay or the file fails to load — always handle it.
        audio.play()
          .then(() => {
            musicIcon.querySelector('path').setAttribute('d', pauseIconPath);
            musicIcon.setAttribute('viewBox', '0 0 320 512');
            musicBtn.setAttribute('aria-label', 'Pause music');
          })
          .catch((err) => {
            console.warn('Playback failed:', err);
          });
      } else {
        audio.pause();
        musicIcon.querySelector('path').setAttribute('d', playIconPath);
        musicIcon.setAttribute('viewBox', '0 0 384 512');
        musicBtn.setAttribute('aria-label', 'Play music');
      }
    });
  </script>
