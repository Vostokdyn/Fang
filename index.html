<!DOCTYPE html>
<html lang="en">
<head>
<link rel="icon" type="image/x-icon" href="favicon.png">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vostok Dynamics</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Russo+One&family=Ubuntu:wght@400;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  html, body {
    margin: 0;
    padding: 0;
    font-family: 'Russo One', sans-serif;
    color: #f2ede3;
    overflow-x: hidden;
    background-color: #0a2440;
  }

  /* Parallax background: fixed viewport-sized window containing an
     oversized image that we translate on scroll for a depth effect. */
  .bg-wrap {
    position: fixed;
    inset: 0;
    z-index: 0;
    overflow: hidden;
    background-color: #0a2440;
  }

  .bg-wrap img {
    position: absolute;
    top: -30%;
    left: 50%;
    width: 100%;
    height: 160%;
    object-fit: cover;
    transform: translate3d(-50%, 0, 0) scale(1.06);
    will-change: transform;
  }

  /* Drifting starfield, sits between the image and the color overlay */
  .stars {
    position: fixed;
    inset: 0;
    z-index: 1;
    pointer-events: none;
  }

  .star {
    position: absolute;
    background: #ffffff;
    border-radius: 50%;
    opacity: 0.15;
    animation: twinkle 4s ease-in-out infinite;
  }

  @keyframes twinkle {
    0%, 100% { opacity: 0.1; }
    50% { opacity: 0.85; }
  }

  .bg-overlay {
    position: fixed;
    inset: 0;
    z-index: 2;
    background: linear-gradient(
      to bottom,
      rgba(4, 8, 20, 0.55) 0%,
      rgba(4, 8, 20, 0.3) 40%,
      rgba(4, 8, 20, 0.7) 100%
    );
  }

  .reveal {
    opacity: 0;
    transform: translateY(28px);
    transition: opacity 0.9s ease, transform 0.9s ease;
  }

  .reveal.is-visible {
    opacity: 1;
    transform: translateY(0);
  }

  @media (prefers-reduced-motion: reduce) {
    .bg-wrap img { transform: translate3d(-50%, 0, 0) scale(1) !important; }
    .star { animation: none; opacity: 0.4; }
    .reveal {
      opacity: 1;
      transform: none;
      transition: none;
    }
  }

  .hero {
    position: relative;
    z-index: 3;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 6vh 6vw;
    overflow: hidden;
  }

  .hero > * {
    position: relative;
    z-index: 1;
  }

  .hero img {
    max-width: 75vw;
    max-height: 75vh;
    width: auto;
    height: auto;
    margin-bottom: 3rem;
  }

  .date {
    font-family: 'Russo One', sans-serif;
    font-weight: 400;
    font-size: clamp(2.5rem, 7vw, 6rem);
    color: #e8392f;
    letter-spacing: 0.05em;
    margin: 0 0 2rem 0;
    line-height: 1;
    text-shadow: 0 2px 18px rgba(0, 0, 0, 0.6);
  }

  .quote-block {
    max-width: 700px;
  }

  .quote {
    font-family: 'Russo One', sans-serif;
    font-weight: 400;
    font-size: clamp(1rem, 2.2vw, 1.4rem);
    color: #f2ede3;
    line-height: 1.6;
    margin: 0 0 1rem 0;
    text-shadow: 0 2px 12px rgba(0, 0, 0, 0.7);
  }

  .attribution {
    font-family: 'Russo One', sans-serif;
    font-size: clamp(0.9rem, 1.8vw, 1.1rem);
    color: #e0b83e;
    text-shadow: 0 2px 10px rgba(0, 0, 0, 0.6);
  }

  /* extra scrollable space below the hero */
  .spacer {
    position: relative;
    z-index: 3;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 1.75rem;
  }

  .ig-label {
    font-family: 'Russo One', sans-serif;
    font-size: clamp(1.2rem, 2.5vw, 1.8rem);
    color: #f2ede3;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    text-shadow: 0 2px 12px rgba(0, 0, 0, 0.7);
  }

  .social-row {
    display: flex;
    align-items: flex-start;
    justify-content: center;
    gap: 3.5rem;
    flex-wrap: wrap;
  }

  .social-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1rem;
  }

  .social-link {
    position: relative;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 100px;
    height: 100px;
    border-radius: 50%;
    text-decoration: none;
    background: rgba(20, 20, 20, 0.75);
    border: 2px solid rgba(242, 237, 227, 0.25);
    transition: background 0.2s ease, border-color 0.2s ease, transform 0.2s ease;
  }

  .social-link:hover {
    transform: translateY(-4px);
  }

  .social-link svg {
    width: 44px;
    height: 44px;
    fill: #ffffff;
  }

  .instagram-link:hover {
    background: #d92b2b;
    border-color: rgba(242, 237, 227, 0.6);
  }

  .discord-link:hover {
    background: #5865f2;
    border-color: rgba(242, 237, 227, 0.6);
  }

  .social-handle {
    font-family: 'Russo One', sans-serif;
    font-size: clamp(0.85rem, 1.6vw, 1rem);
    letter-spacing: 0.05em;
    text-shadow: 0 2px 10px rgba(0, 0, 0, 0.6);
  }

  .ig-handle {
    color: #c9a4ff;
  }

  .discord-handle {
    color: #8b93f8;
  }

  .under-construction {
    position: relative;
    z-index: 3;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 2rem;
    padding: 6rem 6vw;
  }

  .uc-text {
    font-family: 'Ubuntu', sans-serif;
    font-weight: 700;
    font-size: clamp(1.8rem, 5vw, 3.5rem);
    color: #f2ede3;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    margin: 0;
    text-shadow: 0 2px 14px rgba(0, 0, 0, 0.7);
  }

  .music-toggle {
    position: fixed;
    top: 24px;
    right: 24px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 56px;
    height: 56px;
    border-radius: 50%;
    background: rgba(20, 20, 20, 0.75);
    border: none;
    cursor: pointer;
    z-index: 10;
    transition: background 0.2s ease;
  }

  .music-toggle:hover {
    background: #d92b2b;
  }

  .music-toggle:focus-visible {
    outline: 2px solid #e0b83e;
    outline-offset: 2px;
  }

  .music-toggle svg {
    width: 26px;
    height: 26px;
    fill: #ffffff;
  }

  @media (prefers-reduced-motion: reduce) {
    .music-toggle,
    .social-link {
      transition: none;
    }
  }

  @media (max-width: 480px) {
    .social-row {
      gap: 2rem;
    }
    .social-link {
      width: 84px;
      height: 84px;
    }
    .social-link svg {
      width: 36px;
      height: 36px;
    }
  }

  /* ---------- Glitch effect (reusable) ---------- */
  /* Apply to any text element that has a matching data-text attribute.
     .is-glitching is toggled briefly by JS for a signal-cutting-out burst. */
  [data-glitch] {
    position: relative;
    display: inline-block;
  }

  [data-glitch]::before,
  [data-glitch]::after {
    content: attr(data-glitch);
    position: absolute;
    left: 0;
    top: 0;
    width: 100%;
    height: 100%;
    opacity: 0;
    color: inherit;
    background: transparent;
    pointer-events: none;
  }

  [data-glitch].is-glitching::before,
  [data-glitch].is-glitching::after {
    opacity: 0.9;
  }

  [data-glitch].is-glitching::before {
    color: #4dfff2;
    clip-path: inset(15% 0 55% 0);
    transform: translate(-4px, -2px);
    animation: glitch-shift-a 0.32s steps(2, end);
  }

  [data-glitch].is-glitching::after {
    color: #ff2b6d;
    clip-path: inset(60% 0 10% 0);
    transform: translate(4px, 2px);
    animation: glitch-shift-b 0.32s steps(2, end);
  }

  @keyframes glitch-shift-a {
    0%   { clip-path: inset(15% 0 55% 0); transform: translate(-4px, -2px); }
    30%  { clip-path: inset(45% 0 20% 0); transform: translate(3px, 1px); }
    60%  { clip-path: inset(5% 0 70% 0);  transform: translate(-2px, 2px); }
    100% { clip-path: inset(35% 0 40% 0); transform: translate(2px, -1px); }
  }

  @keyframes glitch-shift-b {
    0%   { clip-path: inset(60% 0 10% 0); transform: translate(4px, 2px); }
    30%  { clip-path: inset(20% 0 50% 0); transform: translate(-3px, -1px); }
    60%  { clip-path: inset(75% 0 5% 0);  transform: translate(2px, -2px); }
    100% { clip-path: inset(40% 0 35% 0); transform: translate(-2px, 1px); }
  }

  @media (prefers-reduced-motion: reduce) {
    [data-glitch].is-glitching::before,
    [data-glitch].is-glitching::after {
      display: none;
    }
  }

  /* ---------- Founder's note ---------- */
  .founder-note {
    font-family: 'JetBrains Mono', 'Courier New', monospace;
    font-size: clamp(0.75rem, 1.4vw, 0.9rem);
    letter-spacing: 0.05em;
    color: #7fa6c9;
    opacity: 0.85;
    text-shadow: 0 2px 8px rgba(0, 0, 0, 0.6);
  }

  /* ---------- Terminal-style typing text (Under Construction) ---------- */
  .uc-terminal {
    font-family: 'JetBrains Mono', 'Courier New', monospace;
    font-size: clamp(1.1rem, 3vw, 1.8rem);
    letter-spacing: 0.04em;
    color: #7dffb0;
    text-shadow: 0 0 10px rgba(125, 255, 176, 0.5);
    min-height: 1.6em;
  }

  .uc-terminal .cursor {
    display: inline-block;
    width: 0.55em;
    margin-left: 2px;
    background: #7dffb0;
    animation: blink 0.85s steps(1) infinite;
  }

  @keyframes blink {
    0%, 49% { opacity: 1; }
    50%, 100% { opacity: 0; }
  }

  @media (prefers-reduced-motion: reduce) {
    .uc-terminal .cursor { animation: none; opacity: 1; }
  }

  /* ---------- Fixed side progress indicator ---------- */
  .progress-nav {
    position: fixed;
    right: 22px;
    top: 50%;
    transform: translateY(-50%);
    z-index: 20;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
  }

  .progress-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: transparent;
    border: 2px solid rgba(242, 237, 227, 0.45);
    cursor: pointer;
    padding: 0;
    transition: background 0.25s ease, border-color 0.25s ease, transform 0.25s ease;
  }

  .progress-dot:hover {
    border-color: #e0b83e;
    transform: scale(1.2);
  }

  .progress-dot.active {
    background: #e0b83e;
    border-color: #e0b83e;
    transform: scale(1.3);
  }

  .progress-dot:focus-visible {
    outline: 2px solid #e0b83e;
    outline-offset: 3px;
  }

  @media (max-width: 480px) {
    .progress-nav {
      right: 12px;
      gap: 10px;
    }
    .progress-dot {
      width: 8px;
      height: 8px;
    }
  }

  @media (prefers-reduced-motion: reduce) {
    .progress-dot { transition: none; }
  }
</style>
</head>
<body>

  <div class="bg-wrap">
    <img id="bgImg" src="vostok-tigers-bg.jpg" alt="" role="presentation">
  </div>
  <div class="stars" id="stars"></div>
  <div class="bg-overlay"></div>

  <nav class="progress-nav" id="progressNav" aria-label="Section navigation">
    <button class="progress-dot" data-target="section-hero" aria-label="Go to top"></button>
    <button class="progress-dot" data-target="section-social" aria-label="Go to social links"></button>
    <button class="progress-dot" data-target="section-uc" aria-label="Go to under construction"></button>
  </nav>

  <button class="music-toggle" id="musicToggle" aria-label="Play music">

  <section class="hero" id="section-hero">
    <img src="VOSTOK_DYNAMICS.png" alt="Vostok Dynamics">

    <h1 class="date" id="dateText" data-glitch="1962, 1974, 1986, 1998, 2010, and 2022">1962, 1974, 1986, 1998, 2010, and 2022</h1>

    <div class="quote-block reveal">
      <p class="quote">"If you do not enter the tiger's den, how can you get his cub?"</p>
      <p class="attribution">— Chinese Proverb</p>
    </div>
  </section>

  <section class="spacer" id="section-social">
    <p class="ig-label reveal">Find Us</p>

    <div class="social-row">
      <div class="social-item">
        <a class="social-link instagram-link reveal" href="https://www.instagram.com/epsilon.jpeg" target="_blank" rel="noopener noreferrer" aria-label="Follow Vostok Dynamics Owner on Instagram">
          <svg viewBox="0 0 448 512" xmlns="http://www.w3.org/2000/svg">

      <div class="social-item">

  <section class="under-construction" id="section-uc">
    <p class="uc-terminal reveal" id="ucTerminal"><span id="ucTyped"></span><span class="cursor">&nbsp;</span></p>
    <p class="founder-note reveal">— built by @epsilon.jpeg · 2026</p>
  </section>

  <script>
    const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

    // --- Parallax background ---
    const bgImg = document.getElementById('bgImg');
    if (bgImg && !prefersReducedMotion) {
      let ticking = false;
      const PARALLAX_FACTOR = 0.18;

      function updateParallax() {
        const maxOffset = window.innerHeight * 0.22;
        const raw = window.scrollY * PARALLAX_FACTOR;
        const offset = Math.min(raw, maxOffset);
        bgImg.style.transform = `translate3d(-50%, -${offset}px, 0) scale(1.06)`;
        ticking = false;
      }

      window.addEventListener('scroll', () => {
        if (!ticking) {
          requestAnimationFrame(updateParallax);
          ticking = true;
        }
      }, { passive: true });

      updateParallax();
    }

    // --- Starfield ---
    const starsContainer = document.getElementById('stars');
    if (starsContainer) {
      const STAR_COUNT = 60;
      const frag = document.createDocumentFragment();
      for (let i = 0; i < STAR_COUNT; i++) {
        const star = document.createElement('span');
        star.className = 'star';
        const size = Math.random() * 2 + 1;
        star.style.width = `${size}px`;
        star.style.height = `${size}px`;
        star.style.left = `${Math.random() * 100}%`;
        star.style.top = `${Math.random() * 100}%`;
        star.style.animationDelay = `${Math.random() * 4}s`;
        star.style.animationDuration = `${3 + Math.random() * 3}s`;
        frag.appendChild(star);
      }
      starsContainer.appendChild(frag);
    }

    // --- Scroll reveal ---
    const revealEls = document.querySelectorAll('.reveal');
    if ('IntersectionObserver' in window && revealEls.length) {
      const revealObserver = new IntersectionObserver((entries) => {
        entries.forEach((entry) => {
          if (entry.isIntersecting) {
            entry.target.classList.add('is-visible');
            revealObserver.unobserve(entry.target);
          }
        });
      }, { threshold: 0.2 });

      revealEls.forEach((el) => revealObserver.observe(el));
    } else {
      revealEls.forEach((el) => el.classList.add('is-visible'));
    }

    // --- Glitch bursts ---
    // Briefly toggles .is-glitching on any [data-glitch] element at random
    // intervals, giving a signal-cutting-out effect. Runs once immediately
    // shortly after load, then repeats on a random cadence.
    const glitchEls = document.querySelectorAll('[data-glitch]');
    if (glitchEls.length && !prefersReducedMotion) {
      function fireGlitch(el) {
        el.classList.add('is-glitching');
        setTimeout(() => el.classList.remove('is-glitching'), 340);
      }
      function scheduleGlitch(el) {
        const delay = 3500 + Math.random() * 5000;
        setTimeout(() => {
          fireGlitch(el);
          scheduleGlitch(el);
        }, delay);
      }
      glitchEls.forEach((el) => {
        setTimeout(() => fireGlitch(el), 700 + Math.random() * 800);
        scheduleGlitch(el);
      });
      // Also glitch on hover/focus for a bit of interactivity
      glitchEls.forEach((el) => {
        el.addEventListener('mouseenter', () => fireGlitch(el));
      });
    }

    // --- Under Construction: typewriter + glitch finish ---
    const ucTerminal = document.getElementById('ucTerminal');
    const ucTyped = document.getElementById('ucTyped');
    if (ucTerminal && ucTyped) {
      const FULL_TEXT = '> UNDER CONSTRUCTION_';
      let typed = false;

      function typeText() {
        if (typed) return;
        typed = true;
        if (prefersReducedMotion) {
          ucTyped.textContent = FULL_TEXT;
          return;
        }
        let i = 0;
        const interval = setInterval(() => {
          i++;
          ucTyped.textContent = FULL_TEXT.slice(0, i);
          if (i >= FULL_TEXT.length) {
            clearInterval(interval);
            // brief glitch burst once typing finishes
            ucTerminal.setAttribute('data-glitch', FULL_TEXT);
            ucTerminal.classList.add('is-glitching');
            setTimeout(() => ucTerminal.classList.remove('is-glitching'), 340);
          }
        }, 55);
      }

      if ('IntersectionObserver' in window) {
        const typeObserver = new IntersectionObserver((entries) => {
          entries.forEach((entry) => {
            if (entry.isIntersecting) {
              typeText();
              typeObserver.unobserve(entry.target);
            }
          });
        }, { threshold: 0.4 });
        typeObserver.observe(ucTerminal);
      } else {
        typeText();
      }
    }

    // --- Fixed side progress indicator ---
    const progressDots = document.querySelectorAll('.progress-dot');
    const trackedSections = ['section-hero', 'section-social', 'section-uc']
      .map((id) => document.getElementById(id))
      .filter(Boolean);

    progressDots.forEach((dot) => {
      dot.addEventListener('click', () => {
        const target = document.getElementById(dot.dataset.target);
        if (target) {
          target.scrollIntoView({ behavior: prefersReducedMotion ? 'auto' : 'smooth', block: 'start' });
        }
      });
    });

    if ('IntersectionObserver' in window && trackedSections.length) {
      const sectionObserver = new IntersectionObserver((entries) => {
        entries.forEach((entry) => {
          if (entry.isIntersecting) {
            const id = entry.target.id;
            progressDots.forEach((dot) => {
              dot.classList.toggle('active', dot.dataset.target === id);
            });
          }
        });
      }, { threshold: 0.5 });

      trackedSections.forEach((section) => sectionObserver.observe(section));
    }

    const musicBtn = document.getElementById('musicToggle');
    const musicIcon = document.getElementById('musicIcon');
    const audio = document.getElementById('bgMusic');

    const playIconPath = "M73 39c-14.8-9.1-33.4-9.4-48.5-.9S0 62.6 0 80V432c0 17.4 9.4 33.4 24.5 41.9S58.2 481.1 73 472L361 297c14.3-8.7 23-24.2 23-41s-8.7-32.2-23-41L73 39z";
    const pauseIconPath = "M48 64C21.5 64 0 85.5 0 112V400c0 26.5 21.5 48 48 48H80c26.5 0 48-21.5 48-48V112c0-26.5-21.5-48-48-48H48zm192 0c-26.5 0-48 21.5-48 48V400c0 26.5 21.5 48 48 48h32c26.5 0 48-21.5 48-48V112c0-26.5-21.5-48-48-48H240z";

    musicBtn.addEventListener('click', () => {
      if (audio.paused) {
        audio.play()
          .then(() => {
            musicIcon.querySelector('path').setAttribute('d', pauseIconPath);
            musicIcon.setAttribute('viewBox', '0 0 320 512');
            musicBtn.setAttribute('aria-label', 'Pause music');
          })
          .catch((err) => {
            console.warn('Playback failed:', err);
          });
      } else {
        audio.pause();
        musicIcon.querySelector('path').setAttribute('d', playIconPath);
        musicIcon.setAttribute('viewBox', '0 0 384 512');
        musicBtn.setAttribute('aria-label', 'Play music');
      }
    });
  </script>

</body>
